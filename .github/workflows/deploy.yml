name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy-crm:
    name: Deploy CRM (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if frontend/ changed
        id: crm_changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^frontend/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy CRM via SSH
        if: steps.crm_changed.outputs.changed == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "/home/Kelwin/Kelwin - Maquinadevendascanastra"
            git config --global --add safe.directory "/home/Kelwin/Kelwin - Maquinadevendascanastra" && git fetch --prune -f origin && git reset --hard origin/master

            if [ -f "frontend/.env.build" ]; then source frontend/.env.build; elif [ -f "crm/.env.build" ]; then source crm/.env.build; cp crm/.env.build frontend/.env.build || true; else echo ".env.build not found!"; exit 1; fi
            sg docker -c "docker build \
              --build-arg NEXT_PUBLIC_FASTAPI_URL=$NEXT_PUBLIC_FASTAPI_URL \
              --build-arg NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL \
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY \
              -t canastra-crm:latest ./frontend"
            sg docker -c "docker stack deploy -c frontend/docker-compose.yml crm"
            sg docker -c "docker service update \
              --env-add SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY \
              crm_crm"
            sg docker -c "docker service update --force crm_crm"
            echo "CRM deployed successfully"

  deploy-backend:
    name: Deploy Backend (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if backend/ changed
        id: backend_changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^backend/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Backend via SSH
        if: steps.backend_changed.outputs.changed == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "/home/Kelwin/Kelwin - Maquinadevendascanastra"
            git config --global --add safe.directory "/home/Kelwin/Kelwin - Maquinadevendascanastra" && git fetch --prune -f origin && git reset --hard origin/master
            sg docker -c "docker build -t canastra-api:latest ./backend"
            sg docker -c "docker stack deploy -c backend/docker-compose.yml canastra"
            sg docker -c "docker service update --force canastra_api"
            sg docker -c "docker service update --force canastra_worker"
            echo "Backend deployed successfully"
